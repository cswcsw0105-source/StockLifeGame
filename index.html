<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Life Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">Stock Life</h1>
        <p class="subtitle">인생과 주식을 함께 굴리는 시뮬레이션</p>
      </header>

      <main class="layout">
        <section class="panel life-panel" aria-label="인생 상태">
          <h2>인생</h2>
          <div class="stat-grid">
            <div class="stat">
              <span class="stat-label">나이</span>
              <span id="age" class="stat-value">25</span>
            </div>
            <div class="stat">
              <span class="stat-label">현금</span>
              <span id="cash" class="stat-value">₩10,000,000</span>
            </div>
            <div class="stat">
              <span class="stat-label">총 자산</span>
              <span id="netWorth" class="stat-value">₩10,000,000</span>
            </div>
          </div>
          <div class="actions">
            <button type="button" id="btnNextTurn" class="btn primary">
              다음 턴 (1년)
            </button>
          </div>
        </section>

        <section class="panel stock-panel" aria-label="주식 시장">
          <h2>주식 시장</h2>
          <table class="stock-table">
            <thead>
              <tr>
                <th>종목</th>
                <th>현재가</th>
                <th>보유</th>
                <th>매수 수량</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="stockRows"></tbody>
          </table>
        </section>
      </main>

      <footer class="footer">
        <p id="message" class="message" role="status"></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
